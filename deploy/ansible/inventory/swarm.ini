# MinIODB Docker Swarm 集群 Inventory 配置
# 3节点集群：miniodb+redis、minio、minio-backup

[all]
node1 ansible_host=192.168.1.10 ansible_user=root swarm_role=manager
node2 ansible_host=192.168.1.11 ansible_user=root swarm_role=worker
node3 ansible_host=192.168.1.12 ansible_user=root swarm_role=worker

[managers]
node1

[workers]
node2
node3

# 节点角色定义
[miniodb_redis]
node1

[minio]
node2

[minio_backup]
node3

# Swarm 集群配置
[all:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_python_interpreter=/usr/bin/python3

# MinIODB 配置
miniodb_replicas=1
redis_password=redis123
minio_root_user=minioadmin
minio_root_password=minioadmin123
minio_bucket=miniodb-data
minio_backup_user=minioadmin
minio_backup_password=minioadmin123
minio_backup_bucket=miniodb-backup

# MinIODB 简化版 Docker Compose 配置
# 适用于快速开发和测试环境

version: '3.8'

services:
  # Redis - 元数据存储
  redis:
    image: redis:7-alpine
    container_name: miniodb-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD:-redis123}
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - miniodb
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MinIO - 对象存储
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: miniodb-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - miniodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO 初始化
  minio-init:
    image: minio/mc:latest
    container_name: miniodb-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - miniodb
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb minio/${MINIO_BUCKET:-miniodb-data} --ignore-existing;
      mc mb minio/${MINIO_BACKUP_BUCKET:-miniodb-backup} --ignore-existing;
      echo 'MinIO buckets created successfully';
      "

volumes:
  redis_data:
  minio_data:
  miniodb_logs:

networks:
  miniodb:
    driver: bridge
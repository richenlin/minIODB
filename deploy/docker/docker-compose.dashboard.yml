# Docker Compose for Dashboard Service
# 独立部署 Dashboard，连接到已有的 MinIODB 核心服务
#
# 使用方法:
#   1. 确保 miniodb-network 网络已创建:
#      docker network create miniodb-network
#   2. 启动 Dashboard:
#      docker-compose -f docker-compose.dashboard.yml up -d

version: '3.8'

services:
  dashboard:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.dashboard
    image: miniodb-dashboard:latest
    container_name: miniodb-dashboard
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      # Dashboard 配置
      - DASHBOARD_PORT=:9090
      - DASHBOARD_BASE_PATH=/
      # 核心服务连接配置
      - DASHBOARD_CORE_ENDPOINT=http://miniodb:8081
      - DASHBOARD_CORE_GRPC_ENDPOINT=miniodb:8080
      # 日志配置
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    volumes:
      - ../../config:/app/config:ro
      - dashboard_logs:/app/logs
    networks:
      - miniodb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  dashboard_logs:
    driver: local

networks:
  miniodb-network:
    external: true

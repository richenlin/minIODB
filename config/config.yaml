# MinIODB 配置文件
# 本文件只包含用户需要关注的配置项。
# 连接池调优、协议超时、内部缓冲等参数已以常量形式定义在 config/constants.go 中，
# 如需覆盖可在此处添加对应字段，否则使用代码默认值即可。

# ──────────────────────────────────────────────────────────────────────────────
# 服务端口 & 节点身份
# ──────────────────────────────────────────────────────────────────────────────
server:
  grpc_port: ":8080"
  rest_port: ":8081"
  node_id: "node-1"         # 分布式部署时每个节点需保持唯一

# ──────────────────────────────────────────────────────────────────────────────
# 存储后端连接信息
# ──────────────────────────────────────────────────────────────────────────────
network:
  server:
    grpc:
      max_connections: 1000
      connection_timeout: 30s
      stream_timeout: 1m0s
      keep_alive_time: 30s
      keep_alive_timeout: 5s
      max_connection_idle: 15m0s
      max_connection_age: 30m0s
      max_connection_age_grace: 5s
      max_send_msg_size: 4194304
      max_recv_msg_size: 4194304
    rest:
      read_timeout: 30s
      write_timeout: 30s
      idle_timeout: 1m0s
      read_header_timeout: 10s
      max_header_bytes: 1048576
      shutdown_timeout: 30s
  pools:
    redis:
      enabled: true
      mode: standalone
      addr: localhost:6379
      password: redis123
      db: 0
      pool_size: 250
      min_idle_conns: 25
      max_conn_age: 30m0s
      pool_timeout: 3s
      idle_timeout: 5m0s
      dial_timeout: 3s
      read_timeout: 2s
      write_timeout: 2s
      idle_check_freq: 1m0s
      max_retries: 3
      min_retry_backoff: 8ms
      max_retry_backoff: 512ms
      cluster_addrs: []
      max_redirects: 8
      read_only: false
      route_by_latency: true
      route_randomly: false
      master_name: ""
      sentinel_addrs: []
      sentinel_password: ""
    minio:
      endpoint: localhost:9000
      access_key_id: minioadmin
      secret_access_key: minioadmin123
      use_ssl: false
      region: us-east-1
      bucket: miniodb-data
      max_idle_conns: 300
      max_idle_conns_per_host: 150
      max_conns_per_host: 300
      idle_conn_timeout: 1m30s
      dial_timeout: 5s
      tls_handshake_timeout: 5s
      response_header_timeout: 15s
      expect_continue_timeout: 1s
      max_retries: 3
      retry_delay: 100ms
      request_timeout: 1m0s
      keep_alive: 30s
      disable_keep_alive: false
      disable_compression: false
    minio_backup:
      endpoint: localhost:9002
      access_key_id: minioadmin
      secret_access_key: minioadmin123
      use_ssl: false
      region: us-east-1
      bucket: miniodb-backup
      max_idle_conns: 0
      max_idle_conns_per_host: 0
      max_conns_per_host: 0
      idle_conn_timeout: 0s
      dial_timeout: 0s
      tls_handshake_timeout: 0s
      response_header_timeout: 0s
      expect_continue_timeout: 0s
      max_retries: 0
      retry_delay: 0s
      request_timeout: 0s
      keep_alive: 0s
      disable_keep_alive: false
      disable_compression: false
    failover:
      enabled: true
      health_check_interval: 15s
      async_sync:
        queue_size: 1000
        worker_count: 3
        retry_times: 3
        retry_interval: 1s
        sync_timeout: 1m0s
    health_check_interval: 15s
redis:
  enabled: true
  mode: standalone
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 10
  max_conn_age: 0s
  pool_timeout: 0s
  idle_timeout: 0s
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s
  cluster_addrs: []
  max_redirects: 0
  read_only: false
  master_name: ""
  sentinel_addrs: []
  sentinel_password: ""
minio:
  endpoint: localhost:9000
  access_key_id: minioadmin
  secret_access_key: minioadmin
  use_ssl: false
  bucket: olap-data
buffer:
  buffer_size: 5000
  flush_interval: 15s
  worker_pool_size: 20
  task_queue_size: 100
  batch_flush_size: 5
  enable_batching: true
  flush_timeout: 1m0s
  max_retries: 3
  retry_delay: 1s
  temp_dir: /tmp/miniodb_buffer
  parquet_row_group: 10000
  default_bucket: miniodb-data
  wal:
    enabled: true
    dir: data/wal
    sync_on_write: true
backup:
  enabled: false
  interval: 3600
  metadata:
    enabled: true
    interval: 30m0s
    retention_days: 7
    bucket: miniodb-metadata
  replication:
    enabled: false
    interval: 3600
    workers: 4
    max_qps: 50
    max_conns_to_source: 10
    full_verify_interval: 24
    sync_deletes: false
    retry_max: 3
    retry_delay: 5s
    checkpoint_key_prefix: miniodb:replication:checkpoint
    source_bucket: ""
    max_objects_per_sync: 0
  schedules:
  - id: default
    name: Default Backup Schedule
    enabled: true
    interval: 1h0m0s
    cron_expr: ""
    backup_type: metadata
    tables: []
    retention_days: 7
    created_at: 2026-03-21T08:16:36.520672+08:00
    updated_at: 2026-03-21T08:21:10.504401+08:00
security:
  mode: disabled
  jwt_secret: ""
  enable_tls: false
  valid_tokens: []
  rate_limit:
    enabled: false
    requests_per_minute: 60
  smart_rate_limit:
    enabled: true
    default_tier: standard
    tiers: []
    path_limits: []
    cleanup_interval: 5m0s
  cors:
    allowed_origins:
    - http://localhost:3000
    - http://127.0.0.1:3000
    allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    allow_headers:
    - Origin
    - Content-Type
    - Accept
    - Authorization
    allow_credentials: true
    max_age: 86400
rate_limiting:
  enabled: true
  tiers:
    health:
      requests_per_second: 200
      burst_size: 50
      window_size: 1s
    query:
      requests_per_second: 100
      burst_size: 30
      window_size: 1s
    standard:
      requests_per_second: 50
      burst_size: 15
      window_size: 1s
    strict:
      requests_per_second: 20
      burst_size: 5
      window_size: 1s
    write:
      requests_per_second: 80
      burst_size: 20
      window_size: 1s
  path_rules:
  - path: /health
    method: GET
    tier: health
  - path: /v1/health
    method: GET
    tier: health
  - path: /metrics
    method: GET
    tier: health
  - path: /v1/query
    method: POST
    tier: query
  - path: /v1/write
    method: POST
    tier: write
  - path: /v1/backup/trigger
    method: POST
    tier: strict
  - path: /v1/recover
    method: POST
    tier: strict
  default_tier: standard
  response:
    include_tier: true
    include_limit: true
    include_burst: true
    include_window: true
    include_retry_after: true
query_optimization:
  query_cache:
    enabled: true
    redis_key_prefix: 'qcache:'
    default_ttl: 1h0m0s
    max_cache_size: 209715200
    eviction_policy: lru
    cache_strategies:
      aggregation: 30m0s
      complex_query: 10m0s
      count_query: 1h0m0s
      join_query: 15m0s
      simple_select: 2h0m0s
    table_invalidation:
      enabled: true
      invalidation_delay: 5s
    enable_stats: true
    stats_interval: 1m0s
  file_cache:
    enabled: true
    cache_dir: /tmp/miniodb_cache
    max_cache_size: 1073741824
    max_file_age: 4h0m0s
    cleanup_interval: 15m0s
    redis_index:
      enabled: true
      key_prefix: 'fcache:'
      index_ttl: 24h0m0s
    metadata:
      track_access_count: true
      track_creation_time: true
      enable_hash_verification: true
    enable_stats: true
    stats_interval: 1m0s
  duckdb:
    enabled: true
    pool_size: 5
    max_idle_time: 30m0s
    connection_timeout: 30s
    performance:
      memory_limit: 1GB
      threads: 4
      enable_object_cache: true
      temp_directory: /tmp/duckdb
    prepared_statements:
      enabled: true
      cache_size: 100
      auto_prepare_aggregations: true
    connection_reuse:
      enabled: true
      max_reuse_count: 1000
      health_check_interval: 5m0s
    slow_query_threshold: 1s
storage_engine:
  enabled: false
  auto_optimization: false
  optimize_interval: 30m0s
  performance_mode: balanced
  enable_monitoring: false
  enable_profiling: false
  parquet:
    default_compression: zstd
    default_partition: analytical
    auto_select_strategy: true
    compression_analysis: true
    metadata_indexing: true
    custom_strategies:
      analytics_workload: compression_optimized
      mixed_workload: analytical
      streaming_workload: streaming
  sharding:
    default_strategy: hash_uniform
    auto_rebalance: true
    hot_cold_separation: true
    locality_optimization: true
    rebalance_threshold: 0.8
    migration_limit: 3
  indexing:
    auto_index_creation: true
    index_types:
    - bloom
    - minmax
    - inverted
    - bitmap
    - composite
    bloom_filter_enabled: true
    minmax_enabled: true
    inverted_enabled: true
    composite_enabled: true
    maintenance_interval: 1h0m0s
    custom_config:
      bitmap_cardinality_threshold: 1000
      bloom_filter_fpp: 0.01
      inverted_min_term_length: 2
  memory:
    enable_pooling: true
    enable_zero_copy: true
    buffer_optimization: true
    gc_optimization: true
    max_memory_usage: 2147483648
    memory_pool_sizes:
      large: 262144
      medium: 16384
      small: 1024
      xlarge: 1048576
    gc_interval: 5m0s
auth:
  token_expiry: 24h
  api_key_pairs:
  - key: admin
    secret: admin123456
    role: root
    display_name: 管理员
  skip_auth_paths:
  - /health
  - /metrics
  - /v1/health
  require_auth_paths:
  - /v1/write
  - /v1/query
  - /v1/backup/trigger
  - /v1/recover
metrics:
  enabled: true
  port: "9090"
  path: /metrics
  prometheus: false
monitoring:
  enabled: true
  port: :8082
  path: /metrics
  prometheus: true
log:
  level: info
  format: json
  output: both
  filename: logs/minIODB.log
  max_size: 100
  max_backups: 5
  max_age: 30
  compress: true
tables:
  default_config:
    buffer_size: 5000
    flush_interval: 15s
    retention_days: 365
    backup_enabled: true
    properties: {}
    id_strategy: user_provided
    id_prefix: ""
    auto_generate_id: false
    id_validation:
      max_length: 255
      pattern: ^[a-zA-Z0-9_-]+$
      allowed_chars: ""
    field_encryption: null
table_management:
  auto_create_tables: true
  default_table: default
  max_tables: 1000
  table_name_pattern: ^[a-zA-Z][a-zA-Z0-9_]{0,63}$
system:
  max_memory_mb: 0
  max_goroutines: 0
compaction:
  enabled: true
  target_file_size: 134217728
  min_files_to_compact: 5
  max_files_to_compact: 20
  cooldown_period: 5m0s
  check_interval: 10m0s
  temp_dir: /tmp/miniodb_compaction
  compression_type: snappy
  max_rows_per_file: 1000000
  tiered:
    enabled: true
    levels:
    - name: L0
      max_file_size: 16777216
      target_file_size: 16777216
      min_files_to_merge: 5
      cooldown_period: 2m0s
    - name: L1
      max_file_size: 67108864
      target_file_size: 67108864
      min_files_to_merge: 3
      cooldown_period: 5m0s
    - name: L2
      max_file_size: 268435456
      target_file_size: 268435456
      min_files_to_merge: 2
      cooldown_period: 10m0s
    - name: L3
      max_file_size: 1073741824
      target_file_size: 536870912
      min_files_to_merge: 2
      cooldown_period: 30m0s
    max_files_to_merge: 20
file_metadata:
  key_prefix: 'file_meta:'
  ttl: 720h0m0s
  enable_sidecar: true
  redis_ping_timeout: 2s
coordinator:
  hash_ring_replicas: 150
  write_timeout: 10s
  distributed_query_timeout: 30s
  remote_query_timeout: 10s
  node_monitor_interval: 30s
subscription:
  enabled: false
  redis:
    enabled: false
    stream_prefix: 'miniodb:stream:'
    consumer_group: miniodb-workers
    consumer_name: ""
    batch_size: 100
    block_timeout: 5s
    max_retries: 3
    retry_delay: 1s
    max_len: 0
    auto_ack: true
  kafka:
    enabled: false
    brokers:
    - localhost:9092
    topic_prefix: miniodb-
    consumer_group: miniodb-workers
    batch_size: 100
    batch_timeout: 1s
    max_retries: 3
    retry_backoff: 100ms
    session_timeout: 30s
    heartbeat_period: 3s
    auto_commit: true
    commit_interval: 1s
    start_offset: latest
    use_tls: false
    cert_file: ""
    key_file: ""
    ca_file: ""
    use_sasl: false
    sasl_username: ""
    sasl_password: ""
    sasl_mechanism: plain
sla:
  enabled: true
  query_latency_p50: 100ms
  query_latency_p95: 1s
  query_latency_p99: 5s
  cache_hit_rate: 0.7
  file_prune_rate: 0.3
  write_latency_p95: 500ms
  alert_on_violation: true
benchmark:
  enabled: false
  auto_run: false
  run_interval: 0s
  timeout: 0s
  max_retries: 0
swagger:
  enabled: true
  host: localhost:8081
  base_path: /v1
  title: MinIODB API
  description: 基于MinIO+DuckDB+Redis的分布式OLAP系统API
dashboard:
  enabled: true
  port: :9090
  base_path: /dashboard
  core_endpoint: http://localhost:8081
  core_grpc_endpoint: localhost:8080
  metrics_scrape_interval: 5s
  log_dir: ""
  backup_dir: ""
debug:
  enabled: false

# MinIODB 配置文件
# 本文件只包含用户需要关注的配置项。
# 连接池调优、协议超时、内部缓冲等参数已以常量形式定义在 config/constants.go 中，
# 如需覆盖可在此处添加对应字段，否则使用代码默认值即可。

# ──────────────────────────────────────────────────────────────────────────────
# 服务端口 & 节点身份
# ──────────────────────────────────────────────────────────────────────────────
server:
  grpc_port: ":8080"
  rest_port: ":8081"
  node_id: "node-1"         # 分布式部署时每个节点需保持唯一

# ──────────────────────────────────────────────────────────────────────────────
# 存储后端连接信息
# ──────────────────────────────────────────────────────────────────────────────
network:
  pools:
    # Redis 连接信息（支持 standalone / sentinel / cluster 三种模式）
    redis:
      mode: "standalone"              # standalone | sentinel | cluster
      addr: "localhost:6379"          # standalone 模式地址
      password: ""
      db: 0

      # 哨兵模式（mode: sentinel 时取消注释）
      # master_name: "mymaster"
      # sentinel_addrs:
      #   - "redis-sentinel-1:26379"
      #   - "redis-sentinel-2:26379"
      # sentinel_password: ""

      # 集群模式（mode: cluster 时取消注释）
      # cluster_addrs:
      #   - "redis-node-1:7000"
      #   - "redis-node-2:7001"

    # MinIO 主实例
    minio:
      endpoint: "localhost:9000"
      access_key_id: "minioadmin"
      secret_access_key: "minioadmin123"
      use_ssl: false
      region: "us-east-1"
      bucket: "miniodb-data"

    # 备份 MinIO（backup.enabled: true 时生效，取消注释并填写）
    # backup_minio:
    #   endpoint: "localhost:9002"
    #   access_key_id: "minioadmin"
    #   secret_access_key: "minioadmin123"
    #   use_ssl: false
    #   region: "us-east-1"
    #   bucket: "miniodb-backup"

    # 故障切换开关（内部参数见 constants.go）
    failover:
      enabled: true

# ──────────────────────────────────────────────────────────────────────────────
# 认证
# ──────────────────────────────────────────────────────────────────────────────
auth:
  enable_jwt: true
  jwt_secret: "5Umj+4uj1HCHXhIVqg+8oes2KM+SvwAAmqWgxBwf3FE="   # 生产环境请替换
  token_expiry: "24h"
  enable_api_key: true
  api_keys:
    - "api-key-1234567890abcdef"    # 生产环境请替换为强随机值

# ──────────────────────────────────────────────────────────────────────────────
# 日志
# ──────────────────────────────────────────────────────────────────────────────
log:
  level: "info"           # debug | info | warn | error
  format: "json"          # json | text
  output: "both"          # stdout | file | both
  filename: "logs/minIODB.log"
  max_size: 100           # MB
  max_backups: 5
  max_age: 30             # 天
  compress: true

# ──────────────────────────────────────────────────────────────────────────────
# 监控 & Metrics
# ──────────────────────────────────────────────────────────────────────────────
monitoring:
  enabled: true
  port: ":8082"
  path: "/metrics"
  prometheus: true

# ──────────────────────────────────────────────────────────────────────────────
# SLA 监控告警阈值
# ──────────────────────────────────────────────────────────────────────────────
sla:
  enabled: true
  query_latency_p50: "100ms"
  query_latency_p95: "1s"
  query_latency_p99: "5s"
  cache_hit_rate: 0.7
  file_prune_rate: 0.3
  write_latency_p95: "500ms"
  alert_on_violation: true

# ──────────────────────────────────────────────────────────────────────────────
# 备份
# ──────────────────────────────────────────────────────────────────────────────
backup:
  enabled: false
  interval: 3600          # 秒
  minio:
    endpoint: "localhost:9002"
    access_key_id: "minioadmin"
    secret_access_key: "minioadmin123"
    use_ssl: false
    bucket: "miniodb-backup"
  metadata:
    enabled: true
    interval: 30m
    retention_days: 7
    bucket: "miniodb-metadata"

# ──────────────────────────────────────────────────────────────────────────────
# 限流（各等级的速率 & 突发容量；路径规则见 constants.go）
# ──────────────────────────────────────────────────────────────────────────────
rate_limiting:
  enabled: true
  default_tier: "standard"
  tiers:
    health:
      requests_per_second: 200
      burst_size: 50
      window_size: "1s"
    query:
      requests_per_second: 100
      burst_size: 30
      window_size: "1s"
    write:
      requests_per_second: 80
      burst_size: 20
      window_size: "1s"
    standard:
      requests_per_second: 50
      burst_size: 15
      window_size: "1s"
    strict:
      requests_per_second: 20
      burst_size: 5
      window_size: "1s"

# ──────────────────────────────────────────────────────────────────────────────
# 查询优化（开关 & 容量限制；内部调优参数见 constants.go）
# ──────────────────────────────────────────────────────────────────────────────
query_optimization:
  query_cache:
    enabled: true
    default_ttl: 3600s       # 默认查询缓存 TTL
    max_cache_size: 209715200 # 200MB
  file_cache:
    enabled: true
    cache_dir: "/tmp/miniodb_cache"
    max_cache_size: 1073741824  # 1GB
    max_file_age: 14400s        # 4 小时
  duckdb:
    enabled: true
    pool_size: 5
    performance:
      memory_limit: "1GB"
      threads: 4

# ──────────────────────────────────────────────────────────────────────────────
# 缓冲区（主要写入参数；内部处理参数见 constants.go）
# ──────────────────────────────────────────────────────────────────────────────
buffer:
  buffer_size: 5000
  flush_interval: 15s

# ──────────────────────────────────────────────────────────────────────────────
# 表管理
# ──────────────────────────────────────────────────────────────────────────────
table_management:
  auto_create_tables: true
  default_table: "default"
  max_tables: 1000
  table_name_pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,63}$"
  default_config:
    buffer_size: 1000
    flush_interval: 30s
    retention_days: 365
    backup_enabled: true
    id_strategy: "snowflake"       # uuid | snowflake | custom | user_provided
    id_prefix: ""
    auto_generate_id: false
    id_validation:
      required: true
      max_length: 255
      pattern: "^[a-zA-Z0-9_-]+$"
      allowed_chars: "utf-8"

# ──────────────────────────────────────────────────────────────────────────────
# Compaction（主要开关 & 目标文件大小；内部参数见 constants.go）
# ──────────────────────────────────────────────────────────────────────────────
compaction:
  enabled: true
  target_file_size: 134217728  # 128MB

# ──────────────────────────────────────────────────────────────────────────────
# 数据订阅（默认全部关闭；连接信息按需填写）
# ──────────────────────────────────────────────────────────────────────────────
subscription:
  enabled: false
  redis:
    enabled: false
    # 仅 enabled: true 时需要填写
    # consumer_name: ""  # 留空则自动生成唯一名称
  kafka:
    enabled: false
    # 仅 enabled: true 时需要填写
    # brokers:
    #   - "localhost:9092"
    # use_tls: false
    # use_sasl: false
    # sasl_username: ""
    # sasl_password: ""

# ──────────────────────────────────────────────────────────────────────────────
# Swagger API 文档
# ──────────────────────────────────────────────────────────────────────────────
swagger:
  enabled: true              # 生产环境建议设为 false
  host: "localhost:8081"

# ──────────────────────────────────────────────────────────────────────────────
# Dashboard（可选）
# ──────────────────────────────────────────────────────────────────────────────
# dashboard:
#   enabled: false
#   port: ":9090"
#   core_endpoint: "http://localhost:8081"
#   core_grpc_endpoint: "localhost:8080"

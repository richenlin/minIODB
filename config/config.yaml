# MinIODB 配置文件（精简版）
# 内部调优参数（连接池、超时、重试等）已在 config/constants.go 中定义默认值，
# config/config.go 的 setDefaults() 会自动应用。如需覆盖可在此添加对应字段。

# === 服务配置 ===
server:
  grpc_port: ":8080"
  rest_port: ":8081"
  node_id: "node-1"     # 分布式部署时每个节点必须唯一

# === 连接配置 ===
network:
  pools:
    redis:
      enabled: true
      mode: standalone    # standalone | sentinel | cluster
      addr: localhost:6379
      password: "redis123"
      db: 0
    minio:
      endpoint: localhost:9000
      access_key_id: minioadmin
      secret_access_key: minioadmin123
      use_ssl: false
      region: us-east-1
      bucket: miniodb-data
    minio_backup:
      endpoint: localhost:9002
      access_key_id: minioadmin
      secret_access_key: minioadmin123
      use_ssl: false
      region: us-east-1
      bucket: miniodb-backup

# === 写入缓冲 ===
buffer:
  buffer_size: 5000       # 缓冲区大小（条数）
  flush_interval: 15s     # 刷写间隔

# === 备份 ===
backup:
  enabled: false
  metadata:
    enabled: true
    bucket: miniodb-metadata
    interval: 30m

# === 安全 ===
security:
  mode: disabled          # disabled | api_key | jwt
  jwt_secret: ""          # JWT 模式时必填，至少 32 字符
  cors:
    allowed_origins:
      - "http://localhost:3000"
      - "http://127.0.0.1:3000"
    allow_credentials: true

# === 认证 ===
auth:
  api_key_pairs:
    - key: admin
      secret: admin123456
      role: root
      display_name: 管理员
  token_expiry: 24h

# === 日志 ===
log:
  level: info             # debug | info | warn | error
  format: json            # json | console
  filename: logs/minIODB.log
  max_size: 100           # MB
  max_backups: 5
  max_age: 30             # 天
  compress: true

# === 监控 ===
monitoring:
  enabled: true
  port: ":8082"

# === Dashboard ===
dashboard:
  enabled: true
  port: ":9090"
  metrics_scrape_interval: 5s

# === Swagger ===
swagger:
  enabled: true

# === 表默认配置 ===
tables:
  default_config:
    buffer_size: 5000
    flush_interval: 15s
    retention_days: 365

# === 调试 ===
debug:
  enabled: false

server:
  grpc_port: ":8080"
  rest_port: ":8081"
  node_id: "test-node-local"

# Redis配置
redis:
  enabled: true
  mode: "standalone"
  addr: "localhost:6379"
  password: "redis123"
  db: 0
  pool_size: 100
  min_idle_conns: 10

# MinIO主池配置
minio:
  endpoint: "localhost:9000"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin123"
  use_ssl: false
  bucket: "miniodb-data"

# 网络和连接池配置
network:
  pools:
    redis:
      enabled: true
      mode: "standalone"
      addr: "localhost:6379"
      password: "redis123"
      db: 0
      pool_size: 100
      min_idle_conns: 10
      dial_timeout: 5s
      read_timeout: 3s
      write_timeout: 3s
    
    minio:
      endpoint: "localhost:9000"
      access_key_id: "minioadmin"
      secret_access_key: "minioadmin123"
      use_ssl: false
      region: "us-east-1"
      bucket: "miniodb-data"
      max_idle_conns: 100
      max_idle_conns_per_host: 50
      max_conns_per_host: 100
      idle_conn_timeout: 90s
      dial_timeout: 5s
      request_timeout: 60s
      max_retries: 3
    
    backup_minio:
      endpoint: "localhost:9002"
      access_key_id: "minioadmin"
      secret_access_key: "minioadmin123"
      use_ssl: false
      region: "us-east-1"
      bucket: "miniodb-backup"
      max_idle_conns: 50
      max_idle_conns_per_host: 25
      max_conns_per_host: 50
      idle_conn_timeout: 90s
      dial_timeout: 10s
      request_timeout: 120s
      max_retries: 3
    
    failover:
      enabled: true
      health_check_interval: 10s
      async_sync:
        queue_size: 100
        worker_count: 2
        retry_times: 3
        retry_interval: 1s
        sync_timeout: 30s

# Buffer配置
buffer:
  buffer_size: 10
  flush_interval: 5s
  worker_pool_size: 5
  task_queue_size: 50
  enable_batching: true
  temp_dir: "/tmp/miniodb_buffer"
  default_bucket: "miniodb-data"
  wal:
    enabled: true
    dir: "data/wal"
    sync_on_write: true

# 备份配置
backup:
  enabled: true
  interval: 3600
  minio:
    endpoint: "localhost:9002"
    access_key_id: "minioadmin"
    secret_access_key: "minioadmin123"
    use_ssl: false
    bucket: "miniodb-backup"
  metadata:
    enabled: true
    interval: 30m
    retention_days: 7
    bucket: "miniodb-metadata"

# 日志配置
log:
  level: "debug"
  format: "json"
  output: "both"
  filename: "logs/minIODB.log"

# 查询优化
query_optimization:
  query_cache:
    enabled: true
  file_cache:
    enabled: true
    cache_dir: "/tmp/miniodb_cache"
  duckdb:
    enabled: true
    pool_size: 3

# 表管理
table_management:
  auto_create_tables: true
  default_table: "default"
  max_tables: 100

# Swagger配置
swagger:
  enabled: true
  host: "localhost:8081"
  base_path: "/v1"
